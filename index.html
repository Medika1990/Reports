<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جستجوی جدول</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Tahoma, sans-serif;
    }

    body{
        background:#f4f6f9;
        padding:40px;
    }

    .container{
        max-width:1000px;
        margin:auto;
    }

    .search-box{
        margin-bottom:20px;
    }

    .search-box input{
        width:100%;
        padding:15px 20px;
        border:none;
        border-radius:12px;
        font-size:16px;
        box-shadow:0 4px 12px rgba(0,0,0,.1);
        outline:none;
        transition:.3s;
    }

    .search-box input:focus{
        box-shadow:0 4px 20px rgba(0,123,255,.3);
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:white;
        border-radius:12px;
        overflow:hidden;
        box-shadow:0 4px 12px rgba(0,0,0,.1);
    }

    thead{
        background:#007bff;
        color:white;
    }

    th,td{
        padding:14px;
        text-align:center;
        border-bottom:1px solid #eee;
    }

    tbody tr:hover{
        background:#f8f9fa;
    }

    .hidden{
        display:none;
    }
</style>
</head>
<body>

<div class="container">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="جستجو کنید...">
    </div>

    <table id="myTable">
        <thead>
            <tr>
                <th>کد</th>
                <th>نام</th>
                <th>شهر</th>
                <th>سمت</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1001</td>
                <td>مهدی</td>
                <td>تهران</td>
                <td>برنامه‌نویس</td>
            </tr>
            <tr>
                <td>1002</td>
                <td>علی</td>
                <td>اصفهان</td>
                <td>تحلیلگر</td>
            </tr>
            <tr>
                <td>1003</td>
                <td>رضا</td>
                <td>شیراز</td>
                <td>مدیر پروژه</td>
            </tr>
            <tr>
                <td>1004</td>
                <td>سارا</td>
                <td>تبریز</td>
                <td>طراح UI</td>
            </tr>
        </tbody>
    </table>

</div>

<script>
document.getElementById("searchInput").addEventListener("keyup", function () {

    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#myTable tbody tr");

    rows.forEach(row => {
        let text = row.textContent.toLowerCase();

        if (text.includes(filter))
            row.style.display = "";
        else
            row.style.display = "none";
    });

});
</script>

</body>
</html>
